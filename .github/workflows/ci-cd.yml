name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ✅ ÉTAPE 1 : Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4
 
      # ✅ ÉTAPE 3 : Compiler le backend avec Maven
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests
          echo "✅ Backend compiled successfully"


      # ✅ ÉTAPE 3 : Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ ÉTAPE 4 : Builder l'image backend
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./springboot/app

      # ✅ ÉTAPE 5 : Builder l'image frontend
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./angular-app

      # ✅ ÉTAPE 6 : Tester que les images se buildent sans erreur
      - name: Verify images built successfully
        run: |
          docker images | grep backend
          docker images | grep frontend

      # ✅ ÉTAPE 7 : Pusher l'image backend vers Docker Hub
      - name: Push backend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      # ✅ ÉTAPE 8 : Pusher l'image frontend vers Docker Hub
      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      # ✅ ÉTAPE 9 : Tester avec docker-compose (optionnel)
      - name: Test application with Docker Compose
        run: |
          echo "Starting application..."
          docker-compose up -d
          echo "Waiting for services to be ready..."
          sleep 10
          echo "Services started. Checking status..."
          docker-compose ps
          docker-compose logs || true

      # ✅ ÉTAPE 10 : Arrêter docker-compose après les tests
      - name: Cleanup Docker Compose
        if: always()  # Exécuter même en cas d'erreur
        run: |
          docker-compose down || true

      # ✅ ÉTAPE 11 : Afficher un résumé de succès
      - name: Build Success Summary
        if: success()
        run: |
          echo "╔═════════════════════════════════════════════════════════╗"
          echo "║      ✅ WORKFLOW COMPLETED SUCCESSFULLY                ║"
          echo "╚═════════════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Images pushed to Docker Hub:"
          echo "   Backend:  ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest"
          echo "   Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest"
          echo ""

      # ❌ ÉTAPE 12 : Afficher un message en cas d'erreur
      - name: Build Failure Summary
        if: failure()
        run: |
          echo "╔═════════════════════════════════════════════════════════╗"
          echo "║      ❌ WORKFLOW FAILED - CHECK LOGS ABOVE              ║"
          echo "╚═════════════════════════════════════════════════════════╝"
          echo ""
          echo "⚠️ Troubleshooting steps:"
          echo "1. Check Docker build errors above"
          echo "2. Verify Dockerfile paths are correct"
          echo "3. Verify secrets are set correctly"
          echo "4. Check Docker Hub credentials"
          echo ""
          exit 1
